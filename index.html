<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Canvas Collab</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:system-ui,sans-serif;background:#111;color:#eee}
#app{height:100vh;display:flex;flex-direction:column}
.screen{display:none;flex-direction:column;height:100%}
.screen.active{display:flex}
#home{align-items:center;justify-content:center;gap:1.5rem;padding:2rem;background:#111}
.logo h1{font-size:28px;font-weight:600;color:#fff;text-align:center}
.logo p{font-size:14px;color:#888;text-align:center;margin-top:6px}
.card{background:#1e1e1e;border:1px solid #333;border-radius:12px;padding:1.5rem;width:100%;max-width:360px}
.card h2{font-size:13px;font-weight:500;color:#666;margin-bottom:14px;text-transform:uppercase;letter-spacing:.06em}
.btn{border-radius:8px;padding:12px 18px;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;width:100%;border:none}
.btn-white{background:#fff;color:#111}
.btn-white:hover{background:#e8e8e8}
.btn-outline{background:transparent;color:#eee;border:1px solid #444}
.btn-outline:hover{background:#222}
.inp{width:100%;padding:11px 14px;border:1px solid #444;border-radius:8px;font-size:15px;background:#2a2a2a;color:#fff;outline:none;margin-bottom:10px}
.inp:focus{border-color:#666}
.err{color:#f87171;font-size:12px;margin-top:6px;min-height:16px}
#canvas-screen{flex:1;height:100%}
.toolbar{display:flex;align-items:center;gap:6px;padding:8px 12px;border-bottom:1px solid #2a2a2a;background:#1a1a1a;flex-wrap:wrap}
.sess-badge{background:#2a2a2a;border:1px solid #333;border-radius:8px;padding:4px 10px;font-size:12px;color:#888;display:flex;align-items:center;gap:6px}
.sess-badge b{color:#fff;letter-spacing:.1em;font-size:13px}
.online-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sep{width:1px;height:22px;background:#333;margin:0 2px;flex-shrink:0}
.tbtn{background:none;border:1px solid transparent;border-radius:7px;padding:6px 9px;cursor:pointer;font-size:13px;color:#aaa;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:all .12s}
.tbtn:hover{background:#2a2a2a;color:#fff}
.tbtn.on{background:#2a2a2a;border-color:#444;color:#fff}
.swatch{width:22px;height:22px;border-radius:50%;border:1px solid #555;cursor:pointer;flex-shrink:0}
input[type=color]{width:0;height:0;opacity:0;position:absolute;pointer-events:none}
.szwrap{display:flex;align-items:center;gap:6px;font-size:12px;color:#888}
.szwrap input[type=range]{width:60px;accent-color:#fff}
.ml{margin-left:auto}
.dlbtn{background:#fff;color:#111;border:none;border-radius:7px;padding:7px 13px;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px}
.dlbtn:hover{background:#e8e8e8}
#file-input{display:none}
.cwrap{flex:1;position:relative;overflow:hidden;background:#1a1a1a}
#canvas{display:block;cursor:crosshair;touch-action:none}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#fff;color:#111;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:500;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast.show{opacity:1}
.users-lbl{font-size:12px;color:#666;display:flex;align-items:center;gap:4px}
.cursor-remote{position:absolute;pointer-events:none;transform:translate(-4px,-4px);transition:left .05s,top .05s}
.cursor-dot{width:10px;height:10px;border-radius:50%;border:2px solid #fff}
.cursor-name{font-size:10px;color:#fff;background:rgba(0,0,0,.6);padding:1px 5px;border-radius:4px;margin-top:2px;white-space:nowrap}
</style>
</head>
<body>
<div id="app">
  <div id="home" class="screen active">
    <div class="logo">
      <h1>🎨 Canvas Collab</h1>
      <p>Dessinez ensemble, en temps réel</p>
    </div>
    <div class="card">
      <h2>Créer une session</h2>
      <button class="btn btn-white" onclick="createSession()">＋ Nouvelle session</button>
    </div>
    <div class="card">
      <h2>Rejoindre une session</h2>
      <input class="inp" id="join-inp" placeholder="Code (ex: AB12CD)" maxlength="6" style="text-transform:uppercase;letter-spacing:.12em;font-size:17px;text-align:center">
      <button class="btn btn-outline" onclick="joinSession()">→ Rejoindre</button>
      <div class="err" id="join-err"></div>
    </div>
  </div>

  <div id="canvas-screen" class="screen">
    <div class="toolbar">
      <div class="sess-badge">
        <span class="online-dot"></span>
        <b id="code-lbl"></b>
        <button class="tbtn" style="padding:2px 5px;font-size:12px" onclick="copyCode()" title="Copier">📋</button>
      </div>
      <div class="users-lbl">👥 <span id="users-lbl">1</span></div>
      <div class="sep"></div>
      <button class="tbtn on" id="t-draw" onclick="setTool('draw')">✏️ Dessin</button>
      <button class="tbtn" id="t-erase" onclick="setTool('erase')">🧹 Gomme</button>
      <button class="tbtn" id="t-text" onclick="setTool('text')">T Texte</button>
      <div class="sep"></div>
      <div class="swatch" id="swatch" style="background:#ffffff" onclick="document.getElementById('cpick').click()"></div>
      <input type="color" id="cpick" value="#ffffff" oninput="setColor(this.value)">
      <div class="szwrap">
        <input type="range" min="1" max="40" value="4" id="bsize" step="1" oninput="brushSize=+this.value;document.getElementById('szlbl').textContent=this.value+'px'">
        <span id="szlbl">4px</span>
      </div>
      <div class="sep"></div>
      <button class="tbtn" onclick="clearAll()">🗑 Tout effacer</button>
      <button class="tbtn" onclick="document.getElementById('file-input').click()">📷 Publier image</button>
      <input type="file" id="file-input" accept="image/*" onchange="uploadImg(event)">
      <button class="tbtn ml" onclick="toggleBg()">☀️ Fond</button>
      <button class="dlbtn" onclick="dlCanvas()">⬇ Télécharger</button>
    </div>
    <div class="cwrap" id="cwrap">
      <canvas id="canvas"></canvas>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, onValue, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAOpNoNHy0G9BlBAxNV1SX3J1BrA-SJoTM",
  authDomain: "shareablanket-379c8.firebaseapp.com",
  databaseURL: "https://shareablanket-379c8-default-rtdb.firebaseio.com",
  projectId: "shareablanket-379c8",
  storageBucket: "shareablanket-379c8.firebasestorage.app",
  messagingSenderId: "526479892401",
  appId: "1:526479892401:web:bfa183495a97429563a790"
};

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);

let sessionCode, myId;
let canvas, ctx, drawing=false, lx=0, ly=0;
let color='#ffffff', brushSize=4, tool='draw', lightBg=false;
let knownKeys=new Set();
let currentStroke=[];
let myName='';

function uid(){return Math.random().toString(36).slice(2,10)}
function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let s='';for(let i=0;i<6;i++)s+=c[Math.floor(Math.random()*c.length)];return s;}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

const names=['Rouge','Bleu','Vert','Violet','Orange','Rose','Cyan','Jaune'];
const colors=['#ef4444','#3b82f6','#22c55e','#a855f7','#f97316','#ec4899','#06b6d4','#eab308'];

window.createSession = function(){
  const code = genCode();
  openCanvas(code);
}

window.joinSession = function(){
  const v = document.getElementById('join-inp').value.trim().toUpperCase();
  const e = document.getElementById('join-err');
  if(v.length !== 6){e.textContent='Code invalide — 6 caractères requis';return;}
  e.textContent='';
  openCanvas(v);
}

document.getElementById('join-inp').addEventListener('keydown', e=>{if(e.key==='Enter') window.joinSession()});

function openCanvas(code){
  sessionCode = code;
  myId = uid();
  const idx = Math.floor(Math.random()*names.length);
  myName = names[idx];

  document.getElementById('code-lbl').textContent = code;
  document.getElementById('home').classList.remove('active');
  document.getElementById('canvas-screen').classList.add('active');
  initCanvas();
  loadExistingStrokes();
  subscribeStrokes();
  trackPresence();
  trackCursors();
  toast('Session '+code+' — partagez le code !');
}

function initCanvas(){
  canvas = document.getElementById('canvas');
  const wrap = document.getElementById('cwrap');
  canvas.width = wrap.clientWidth || window.innerWidth;
  canvas.height = wrap.clientHeight || window.innerHeight - 60;
  ctx = canvas.getContext('2d');
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mousemove', doDraw);
  canvas.addEventListener('mouseup', stopDraw);
  canvas.addEventListener('mouseleave', stopDraw);
  canvas.addEventListener('mousemove', sendCursor);
  canvas.addEventListener('touchstart', e=>{e.preventDefault();startDraw(e.touches[0])},{passive:false});
  canvas.addEventListener('touchmove', e=>{e.preventDefault();doDraw(e.touches[0]);sendCursorTouch(e.touches[0])},{passive:false});
  canvas.addEventListener('touchend', stopDraw);
  canvas.addEventListener('click', clickText);
}

function pos(e){const r=canvas.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};}

function startDraw(e){
  if(tool==='text') return;
  drawing=true;
  const p=pos(e); lx=p.x; ly=p.y;
  ctx.beginPath();
  ctx.arc(p.x,p.y,brushSize/2,0,Math.PI*2);
  ctx.fillStyle = tool==='erase'?(lightBg?'#f8f8f8':'#1a1a1a'):color;
  ctx.fill();
}

function doDraw(e){
  if(!drawing) return;
  const p=pos(e);
  const seg={x1:lx,y1:ly,x2:p.x,y2:p.y,c:tool==='erase'?(lightBg?'#f8f8f8':'#1a1a1a'):color,s:brushSize};
  drawSeg(seg);
  currentStroke.push(seg);
  lx=p.x; ly=p.y;
}

function stopDraw(){
  if(!drawing || !currentStroke.length){drawing=false;return;}
  drawing=false;
  push(ref(db,`sessions/${sessionCode}/strokes`), {type:'path',segs:JSON.stringify(currentStroke),by:myId});
  currentStroke=[];
}

function drawSeg(seg){
  ctx.beginPath();
  ctx.moveTo(seg.x1,seg.y1);
  ctx.lineTo(seg.x2,seg.y2);
  ctx.strokeStyle=seg.c;
  ctx.lineWidth=seg.s;
  ctx.lineCap='round';
  ctx.lineJoin='round';
  ctx.stroke();
}

function clickText(e){
  if(tool!=='text') return;
  const p=pos(e);
  const txt=prompt('Texte à ajouter :');
  if(!txt) return;
  const fs=Math.max(16,brushSize*4);
  ctx.font=`${fs}px system-ui,sans-serif`;
  ctx.fillStyle=color;
  ctx.fillText(txt,p.x,p.y);
  push(ref(db,`sessions/${sessionCode}/strokes`), {type:'text',text:txt,x:p.x,y:p.y,c:color,s:fs,by:myId});
}

function loadExistingStrokes(){
  onValue(ref(db,`sessions/${sessionCode}/strokes`), snap=>{
    if(!snap.exists()) return;
    ctx.fillStyle = lightBg?'#f8f8f8':'#1a1a1a';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    snap.forEach(child=>{
      knownKeys.add(child.key);
      applyStroke(child.val());
    });
  }, {onlyOnce:true});
}

function subscribeStrokes(){
  onChildAdded(ref(db,`sessions/${sessionCode}/strokes`), snap=>{
    if(knownKeys.has(snap.key)) return;
    knownKeys.add(snap.key);
    const d=snap.val();
    if(d.by===myId) return;
    applyStroke(d);
  });
}

function applyStroke(d){
  if(d.type==='path'){
    JSON.parse(d.segs).forEach(seg=>drawSeg(seg));
  } else if(d.type==='text'){
    ctx.font=`${d.s}px system-ui,sans-serif`;
    ctx.fillStyle=d.c;
    ctx.fillText(d.text,d.x,d.y);
  } else if(d.type==='clear'){
    ctx.fillStyle=lightBg?'#f8f8f8':'#1a1a1a';
    ctx.fillRect(0,0,canvas.width,canvas.height);
  } else if(d.type==='image'){
    const img=new Image();
    img.onload=()=>ctx.drawImage(img,d.x,d.y,d.w,d.h);
    img.src=d.src;
  }
}

function trackPresence(){
  const myRef = ref(db,`sessions/${sessionCode}/users/${myId}`);
  set(myRef, {name:myName, online:true});
  onDisconnect(myRef).remove();
  onValue(ref(db,`sessions/${sessionCode}/users`), snap=>{
    document.getElementById('users-lbl').textContent = snap.exists()?Object.keys(snap.val()).length:1;
  });
}

const remoteCursors={};
function trackCursors(){
  onValue(ref(db,`sessions/${sessionCode}/cursors`), snap=>{
    if(!snap.exists()) return;
    snap.forEach(child=>{
      if(child.key===myId) return;
      const d=child.val();
      let el=remoteCursors[child.key];
      if(!el){
        el=document.createElement('div');
        el.className='cursor-remote';
        el.innerHTML=`<div class="cursor-dot" style="background:${d.color||'#fff'}"></div><div class="cursor-name">${d.name||'?'}</div>`;
        document.getElementById('cwrap').appendChild(el);
        remoteCursors[child.key]=el;
      }
      el.style.left=d.x+'px';
      el.style.top=d.y+'px';
    });
  });
}

let lastCursorSend=0;
function sendCursor(e){
  const now=Date.now();
  if(now-lastCursorSend<50) return;
  lastCursorSend=now;
  const p=pos(e);
  set(ref(db,`sessions/${sessionCode}/cursors/${myId}`),{x:p.x,y:p.y,name:myName,color:colors[names.indexOf(myName)]||'#fff'});
}
function sendCursorTouch(e){sendCursor(e);}

window.setTool=function(t){
  tool=t;
  document.querySelectorAll('.tbtn[id^="t-"]').forEach(b=>b.classList.remove('on'));
  const el=document.getElementById('t-'+t);
  if(el) el.classList.add('on');
  canvas.style.cursor=t==='erase'?'cell':t==='text'?'text':'crosshair';
}

window.setColor=function(v){
  color=v;
  document.getElementById('swatch').style.background=v;
}

window.clearAll=function(){
  if(!confirm('Effacer le canvas pour tout le monde ?')) return;
  ctx.fillStyle=lightBg?'#f8f8f8':'#1a1a1a';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  remove(ref(db,`sessions/${sessionCode}/strokes`));
  knownKeys.clear();
  push(ref(db,`sessions/${sessionCode}/strokes`),{type:'clear',by:myId});
}

window.toggleBg=function(){
  lightBg=!lightBg;
  document.getElementById('cwrap').style.background=lightBg?'#f8f8f8':'#1a1a1a';
  ctx.fillStyle=lightBg?'#f8f8f8':'#1a1a1a';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  loadExistingStrokes();
}

window.uploadImg=function(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const maxW=Math.min(300,canvas.width*0.45);
      const scale=Math.min(maxW/img.width,maxW/img.height,1);
      const w=img.width*scale, h=img.height*scale;
      const x=(canvas.width-w)/2, y=(canvas.height-h)/2;
      ctx.drawImage(img,x,y,w,h);
      push(ref(db,`sessions/${sessionCode}/strokes`),{type:'image',src:ev.target.result,x,y,w,h,by:myId});
      toast('Image publiée pour tout le monde !');
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

window.dlCanvas=function(){
  const link=document.createElement('a');
  link.download='canvas-'+sessionCode+'.png';
  link.href=canvas.toDataURL('image/png');
  link.click();
  toast('Canvas téléchargé !');
}

window.copyCode=function(){
  navigator.clipboard.writeText(sessionCode).then(()=>toast('Code copié : '+sessionCode));
}
</script>
</body>
</html>
