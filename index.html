<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Canvas Collab</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:#0d0d0d;color:#eee;overflow:hidden}
:root{--bg:#0d0d0d;--bar:#141414;--panel:#1a1a1a;--border:#2a2a2a;--hover:#252525;--active:#2e2e2e;--accent:#6366f1;--accent2:#818cf8}

#app{height:100vh;display:flex;flex-direction:column}
.screen{display:none;flex-direction:column;height:100%}
.screen.active{display:flex}

/* ── HOME ── */
#home{align-items:center;justify-content:center;gap:2rem;padding:2rem;background:var(--bg);position:relative;overflow:hidden}
#home::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,.08) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.home-logo{text-align:center;z-index:1}
.home-logo h1{font-size:32px;font-weight:700;background:linear-gradient(135deg,#fff 40%,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.home-logo p{font-size:14px;color:#555;margin-top:6px}
.home-cards{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;z-index:1;width:100%;max-width:720px}
.hcard{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:1.5rem;flex:1;min-width:280px;max-width:340px}
.hcard h2{font-size:11px;font-weight:600;color:#444;margin-bottom:1rem;text-transform:uppercase;letter-spacing:.1em}
.btn{border-radius:10px;padding:12px 18px;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;width:100%;border:none}
.btn-accent{background:var(--accent);color:#fff}.btn-accent:hover{background:var(--accent2)}
.btn-outline{background:transparent;color:#ccc;border:1px solid var(--border)}.btn-outline:hover{background:var(--hover);border-color:#444}
.inp{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:10px;font-size:15px;background:#111;color:#fff;outline:none;margin-bottom:10px;transition:border .15s}
.inp:focus{border-color:var(--accent)}
.err{color:#f87171;font-size:12px;margin-top:6px;min-height:16px}

/* ── CANVAS SCREEN ── */
#canvas-screen{flex:1;overflow:hidden}
.toolbar{display:flex;align-items:center;gap:4px;padding:6px 10px;background:var(--bar);border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0;min-height:48px}

/* session badge */
.sess-badge{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:12px;color:#666}
.sess-badge b{color:#fff;letter-spacing:.1em;font-size:13px}
.dot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.users-pill{display:flex;align-items:center;gap:4px;font-size:12px;color:#555;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:4px 8px}
.sep{width:1px;height:22px;background:var(--border);margin:0 3px;flex-shrink:0}

/* tool buttons */
.tbtn{background:none;border:1px solid transparent;border-radius:8px;padding:6px 9px;cursor:pointer;font-size:13px;color:#777;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:all .12s;user-select:none}
.tbtn:hover{background:var(--hover);color:#ccc;border-color:var(--border)}
.tbtn.on{background:var(--active);border-color:#3f3f5a;color:#fff}
.tbtn svg{width:15px;height:15px;flex-shrink:0}

/* color palette */
.palette{display:flex;align-items:center;gap:4px}
.pcolor{width:18px;height:18px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .1s,border-color .1s;flex-shrink:0}
.pcolor:hover{transform:scale(1.2)}
.pcolor.selected{border-color:#fff;transform:scale(1.15)}
.swatch{width:22px;height:22px;border-radius:50%;border:2px solid #444;cursor:pointer;flex-shrink:0;transition:transform .1s}
.swatch:hover{transform:scale(1.1)}
input[type=color]{width:0;height:0;opacity:0;position:absolute;pointer-events:none}

/* size */
.szwrap{display:flex;align-items:center;gap:5px;font-size:12px;color:#555}
.szwrap input[type=range]{width:60px;accent-color:var(--accent)}

/* right buttons */
.ml{margin-left:auto}
.btn-dl{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap}
.btn-dl:hover{background:var(--accent2)}
#file-input{display:none}

/* undo/redo */
.history-btns{display:flex;gap:2px}

/* canvas wrap */
.cwrap{flex:1;position:relative;overflow:hidden;background:#1a1a1a}
#canvas{display:block;position:absolute;top:0;left:0;transform-origin:0 0;cursor:crosshair}

/* zoom indicator */
.zoom-badge{position:absolute;bottom:14px;right:14px;background:rgba(0,0,0,.6);border:1px solid var(--border);border-radius:8px;padding:4px 9px;font-size:12px;color:#666;pointer-events:none;z-index:5;backdrop-filter:blur(4px)}

/* minimap */
#minimap{position:absolute;bottom:14px;left:14px;width:160px;height:90px;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:#111;z-index:5;opacity:.85}
#minimap canvas{width:100%;height:100%;display:block}
.minimap-vp{position:absolute;border:1px solid rgba(99,102,241,.6);border-radius:2px;pointer-events:none;background:rgba(99,102,241,.05)}

/* remote cursors */
.cursor-r{position:absolute;pointer-events:none;z-index:20;transition:left .06s,top .06s}
.cursor-arrow{width:12px;height:12px;border-radius:50%}
.cursor-lbl{font-size:10px;font-weight:500;color:#fff;background:rgba(0,0,0,.75);padding:1px 6px;border-radius:4px;margin-top:3px;white-space:nowrap}

/* toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#fff;color:#111;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:500;opacity:0;transition:opacity .25s;pointer-events:none;z-index:9999;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.toast.show{opacity:1}

/* shape preview overlay */
#shape-overlay{position:absolute;top:0;left:0;pointer-events:none;z-index:15;transform-origin:0 0}
</style>
</head>
<body>
<div id="app">

<!-- HOME -->
<div id="home" class="screen active">
  <div class="home-logo">
    <h1>✦ Canvas Collab</h1>
    <p>Dessinez ensemble, en temps réel</p>
  </div>
  <div class="home-cards">
    <div class="hcard">
      <h2>Créer une session</h2>
      <button class="btn btn-accent" onclick="createSession()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nouvelle session
      </button>
    </div>
    <div class="hcard">
      <h2>Rejoindre une session</h2>
      <input class="inp" id="join-inp" placeholder="Code de session" maxlength="6" style="text-transform:uppercase;letter-spacing:.15em;font-size:18px;text-align:center">
      <button class="btn btn-outline" onclick="joinSession()">→ Rejoindre</button>
      <div class="err" id="join-err"></div>
    </div>
  </div>
</div>

<!-- CANVAS -->
<div id="canvas-screen" class="screen">
  <div class="toolbar" id="toolbar">

    <div class="sess-badge">
      <span class="dot"></span>
      <b id="code-lbl"></b>
      <button class="tbtn" style="padding:2px 5px;border:none" onclick="copyCode()" title="Copier le code">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      </button>
    </div>

    <div class="users-pill">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      <span id="users-lbl">1</span>
    </div>

    <div class="sep"></div>

    <!-- TOOLS -->
    <button class="tbtn on" id="t-draw" onclick="setTool('draw')" title="Crayon (B)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg> Dessin
    </button>
    <button class="tbtn" id="t-line" onclick="setTool('line')" title="Ligne (L)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="19" x2="19" y2="5"/></svg> Ligne
    </button>
    <button class="tbtn" id="t-rect" onclick="setTool('rect')" title="Rectangle (R)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg> Rect
    </button>
    <button class="tbtn" id="t-circle" onclick="setTool('circle')" title="Cercle (C)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg> Cercle
    </button>
    <button class="tbtn" id="t-arrow" onclick="setTool('arrow')" title="Flèche (A)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="19" x2="19" y2="5"/><polyline points="9 5 19 5 19 15"/></svg> Flèche
    </button>
    <button class="tbtn" id="t-text" onclick="setTool('text')" title="Texte (T)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg> Texte
    </button>
    <button class="tbtn" id="t-erase" onclick="setTool('erase')" title="Gomme (E)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16l10-10 7 7-3.5 3.5"/><path d="M6.5 17.5l5-5"/></svg> Gomme
    </button>

    <div class="sep"></div>

    <!-- COLORS -->
    <div class="palette" id="palette"></div>
    <div class="swatch" id="swatch" onclick="document.getElementById('cpick').click()" title="Couleur personnalisée"></div>
    <input type="color" id="cpick" value="#ffffff" oninput="setColorCustom(this.value)">

    <div class="sep"></div>

    <!-- SIZE -->
    <div class="szwrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><circle cx="12" cy="12" r="4"/></svg>
      <input type="range" min="1" max="60" value="4" id="bsize" step="1" oninput="brushSize=+this.value;document.getElementById('szlbl').textContent=this.value">
      <span id="szlbl" style="min-width:18px">4</span>
    </div>

    <div class="sep"></div>

    <!-- OPACITY -->
    <div class="szwrap" title="Opacité">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M12 2v20" stroke-dasharray="2 2"/></svg>
      <input type="range" min="10" max="100" value="100" id="opacity-sl" step="1" oninput="brushOpacity=+this.value/100;document.getElementById('oplbl').textContent=this.value+'%'">
      <span id="oplbl" style="min-width:30px">100%</span>
    </div>

    <div class="sep"></div>

    <!-- HISTORY -->
    <div class="history-btns">
      <button class="tbtn" onclick="undoLocal()" title="Annuler (Ctrl+Z)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 00-4-4H4"/></svg>
      </button>
    </div>

    <div class="sep"></div>

    <button class="tbtn" onclick="document.getElementById('file-input').click()" title="Importer image">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg> Image
    </button>
    <input type="file" id="file-input" accept="image/*" onchange="uploadImg(event)">

    <button class="tbtn" onclick="toggleBg()" title="Fond clair/sombre">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>

    <button class="tbtn" onclick="clearAll()" title="Tout effacer" style="color:#f87171">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
    </button>

    <button class="btn-dl ml" onclick="dlCanvas()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Exporter
    </button>

  </div>

  <div class="cwrap" id="cwrap">
    <canvas id="canvas"></canvas>
    <canvas id="shape-overlay"></canvas>
    <div class="zoom-badge" id="zoom-badge">100%</div>
    <div id="minimap">
      <canvas id="minimap-canvas"></canvas>
      <div class="minimap-vp" id="minimap-vp"></div>
    </div>
  </div>
</div>

</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, onValue, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAOpNoNHy0G9BlBAxNV1SX3J1BrA-SJoTM",
  authDomain: "shareablanket-379c8.firebaseapp.com",
  databaseURL: "https://shareablanket-379c8-default-rtdb.firebaseio.com",
  projectId: "shareablanket-379c8",
  storageBucket: "shareablanket-379c8.firebasestorage.app",
  messagingSenderId: "526479892401",
  appId: "1:526479892401:web:bfa183495a97429563a790"
};

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);

// ── STATE ──
let sessionCode, myId, myName, myColor;
let canvas, ctx, ovCanvas, ovCtx;
let drawing=false, lx=0, ly=0, sx=0, sy=0;
let color='#ffffff', brushSize=4, brushOpacity=1, tool='draw', lightBg=false;
let knownKeys=new Set();
let currentStroke=[];
let localHistory=[]; // for undo

// pan/zoom
let panX=0, panY=0, scale=1;
let isPanning=false, pinchDist=0, pinchScale=1, pinchPanX=0, pinchPanY=0, pinchCX=0, pinchCY=0;
let mouseNaving=false, mouseNavStart={x:0,y:0}, mouseNavOrigin={x:0,y:0};
let spaceDown=false;

// minimap
let minimapCtx, minimapInterval;

// ── PALETTE ──
const PALETTE=['#ffffff','#f87171','#fb923c','#facc15','#4ade80','#38bdf8','#818cf8','#e879f9','#000000'];
const pEl=document.getElementById('palette');
PALETTE.forEach(c=>{
  const d=document.createElement('div');
  d.className='pcolor'+(c===color?' selected':'');
  d.style.background=c;
  d.title=c;
  d.onclick=()=>{setColor(c);};
  pEl.appendChild(d);
});
document.getElementById('swatch').style.background=color;

function setColor(c){
  color=c;
  document.getElementById('swatch').style.background=c;
  document.getElementById('cpick').value=c;
  document.querySelectorAll('.pcolor').forEach(el=>el.classList.toggle('selected',el.style.background===hexToRgb(c)||el.style.background===c));
}
window.setColorCustom=function(c){setColor(c);};
function hexToRgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgb(${r}, ${g}, ${b})`;}

// ── UTILS ──
function uid(){return Math.random().toString(36).slice(2,10)}
function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let s='';for(let i=0;i<6;i++)s+=c[Math.floor(Math.random()*c.length)];return s;}
function toast(m,dur=2500){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}

const USER_NAMES=['Astro','Nova','Pixel','Neon','Cyber','Cosmo','Blaze','Echo'];
const USER_COLORS=['#f87171','#38bdf8','#4ade80','#e879f9','#fb923c','#818cf8','#facc15','#34d399'];

// ── INIT ──
window.createSession=()=>openCanvas(genCode());
window.joinSession=function(){
  const v=document.getElementById('join-inp').value.trim().toUpperCase();
  const e=document.getElementById('join-err');
  if(v.length!==6){e.textContent='Code invalide — 6 caractères';return;}
  e.textContent=''; openCanvas(v);
};
document.getElementById('join-inp').addEventListener('keydown',e=>{if(e.key==='Enter')window.joinSession()});

function openCanvas(code){
  sessionCode=code; myId=uid();
  const i=Math.floor(Math.random()*USER_NAMES.length);
  myName=USER_NAMES[i]; myColor=USER_COLORS[i];
  document.getElementById('code-lbl').textContent=code;
  document.getElementById('home').classList.remove('active');
  document.getElementById('canvas-screen').classList.add('active');
  initCanvas();
  loadThenSubscribe();
  trackPresence();
  trackCursors();
  startMinimap();
  toast('Session '+code+' ouverte — partagez le code !');
}

function initCanvas(){
  canvas=document.getElementById('canvas');
  ovCanvas=document.getElementById('shape-overlay');
  const wrap=document.getElementById('cwrap');
  const W=3000, H=3000;
  canvas.width=W; canvas.height=H;
  ovCanvas.width=W; ovCanvas.height=H;
  ovCanvas.style.position='absolute'; ovCanvas.style.top='0'; ovCanvas.style.left='0';
  ovCanvas.style.transformOrigin='0 0'; ovCanvas.style.pointerEvents='none';
  ctx=canvas.getContext('2d');
  ovCtx=ovCanvas.getContext('2d');
  ctx.fillStyle='#1a1a1a'; ctx.fillRect(0,0,W,H);
  // center canvas in view
  panX=(wrap.clientWidth-W*scale)/2;
  panY=(wrap.clientHeight-H*scale)/2;
  updateTransform();
  setupEvents();
  setupKeys();
}

function updateTransform(){
  const t=`translate(${panX}px,${panY}px) scale(${scale})`;
  canvas.style.transform=t;
  ovCanvas.style.transform=t;
  document.getElementById('zoom-badge').textContent=Math.round(scale*100)+'%';
  updateMinimap();
}

function toCanvas(ex,ey){
  const r=canvas.getBoundingClientRect();
  return{x:(ex-r.left)/scale, y:(ey-r.top)/scale};
}

// ── EVENTS ──
function setupKeys(){
  document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT') return;
    if(e.code==='Space'){e.preventDefault();spaceDown=true;document.getElementById('cwrap').style.cursor='grab';}
    if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undoLocal();}
    if(e.key==='b'||e.key==='B') setTool('draw');
    if(e.key==='e'||e.key==='E') setTool('erase');
    if(e.key==='t'||e.key==='T') setTool('text');
    if(e.key==='l'||e.key==='L') setTool('line');
    if(e.key==='r'||e.key==='R') setTool('rect');
    if(e.key==='c'||e.key==='C') setTool('circle');
    if(e.key==='a'||e.key==='A') setTool('arrow');
  });
  document.addEventListener('keyup',e=>{
    if(e.code==='Space'){spaceDown=false;document.getElementById('cwrap').style.cursor='';}
  });
}

function setupEvents(){
  const wrap=document.getElementById('cwrap');

  // wheel zoom
  wrap.addEventListener('wheel',e=>{
    e.preventDefault();
    const f=e.deltaY<0?1.12:1/1.12;
    const r=wrap.getBoundingClientRect();
    const mx=e.clientX-r.left, my=e.clientY-r.top;
    panX=mx-(mx-panX)*f; panY=my-(my-panY)*f;
    scale=Math.min(10,Math.max(0.05,scale*f));
    updateTransform();
  },{passive:false});

  // mouse
  wrap.addEventListener('mousedown',e=>{
    if(e.button===1||(e.button===0&&spaceDown)){
      e.preventDefault(); mouseNaving=true;
      mouseNavStart={x:e.clientX,y:e.clientY}; mouseNavOrigin={x:panX,y:panY};
      wrap.style.cursor='grabbing'; return;
    }
    if(e.button!==0) return;
    if(tool==='text') return;
    const p=toCanvas(e.clientX,e.clientY);
    drawing=true; lx=p.x; ly=p.y; sx=p.x; sy=p.y;
    if(tool==='draw'||tool==='erase'){
      ctx.beginPath(); ctx.arc(p.x,p.y,brushSize/2,0,Math.PI*2);
      ctx.globalAlpha=brushOpacity;
      ctx.fillStyle=tool==='erase'?(lightBg?'#f8f8f8':'#1a1a1a'):color;
      ctx.fill(); ctx.globalAlpha=1;
    }
  });

  wrap.addEventListener('mousemove',e=>{
    if(mouseNaving){
      panX=mouseNavOrigin.x+(e.clientX-mouseNavStart.x);
      panY=mouseNavOrigin.y+(e.clientY-mouseNavStart.y);
      updateTransform(); return;
    }
    if(!drawing) return;
    const p=toCanvas(e.clientX,e.clientY);
    if(tool==='draw'||tool==='erase'){
      const c=tool==='erase'?(lightBg?'#f8f8f8':'#1a1a1a'):color;
      const seg={x1:lx,y1:ly,x2:p.x,y2:p.y,c,s:brushSize,o:brushOpacity};
      drawSeg(seg); currentStroke.push(seg);
      lx=p.x; ly=p.y;
    } else {
      drawShapePreview(sx,sy,p.x,p.y);
    }
    sendCursorPos(p.x,p.y);
  });

  wrap.addEventListener('mouseup',e=>{
    if(mouseNaving){mouseNaving=false;wrap.style.cursor='';return;}
    if(!drawing){return;}
    drawing=false;
    const p=toCanvas(e.clientX,e.clientY);
    if(tool==='draw'||tool==='erase'){
      if(currentStroke.length){
        const entry={type:'path',segs:JSON.stringify(currentStroke),by:myId};
        push(ref(db,`sessions/${sessionCode}/strokes`),entry);
        localHistory.push(entry);
        currentStroke=[];
      }
    } else if(tool!=='text'){
      ovCtx.clearRect(0,0,ovCanvas.width,ovCanvas.height);
      const entry={type:tool,x1:sx,y1:sy,x2:p.x,y2:p.y,c:color,s:brushSize,o:brushOpacity,by:myId};
      drawShape(ctx,entry);
      push(ref(db,`sessions/${sessionCode}/strokes`),entry);
      localHistory.push(entry);
    }
  });
  wrap.addEventListener('mouseleave',e=>{
    if(mouseNaving){mouseNaving=false;wrap.style.cursor='';return;}
    if(drawing&&(tool==='draw'||tool==='erase')&&currentStroke.length){
      drawing=false;
      const entry={type:'path',segs:JSON.stringify(currentStroke),by:myId};
      push(ref(db,`sessions/${sessionCode}/strokes`),entry);
      localHistory.push(entry);
      currentStroke=[];
    } else drawing=false;
  });
  wrap.addEventListener('click',e=>{
    if(tool!=='text'||mouseNaving) return;
    const p=toCanvas(e.clientX,e.clientY);
    const txt=prompt('Texte :'); if(!txt) return;
    const fs=Math.max(14,brushSize*4);
    ctx.globalAlpha=brushOpacity;
    ctx.font=`${fs}px 'Segoe UI',system-ui,sans-serif`; ctx.fillStyle=color;
    ctx.fillText(txt,p.x,p.y); ctx.globalAlpha=1;
    const entry={type:'text',text:txt,x:p.x,y:p.y,c:color,s:fs,o:brushOpacity,by:myId};
    push(ref(db,`sessions/${sessionCode}/strokes`),entry);
    localHistory.push(entry);
  });

  // touch
  wrap.addEventListener('touchstart',e=>{
    if(e.touches.length===1&&tool!=='text'){
      e.preventDefault(); drawing=true;
      const p=toCanvas(e.touches[0].clientX,e.touches[0].clientY);
      lx=p.x; ly=p.y; sx=p.x; sy=p.y;
      if(tool==='draw'||tool==='erase'){
        ctx.beginPath(); ctx.arc(p.x,p.y,brushSize/2,0,Math.PI*2);
        ctx.globalAlpha=brushOpacity;
        ctx.fillStyle=tool==='erase'?(lightBg?'#f8f8f8':'#1a1a1a'):color;
        ctx.fill(); ctx.globalAlpha=1;
      }
    } else if(e.touches.length===2){
      e.preventDefault(); drawing=false;
      if(currentStroke.length){push(ref(db,`sessions/${sessionCode}/strokes`),{type:'path',segs:JSON.stringify(currentStroke),by:myId});currentStroke=[];}
      isPanning=true;
      const cx=(e.touches[0].clientX+e.touches[1].clientX)/2;
      const cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
      pinchCX=cx; pinchCY=cy;
      pinchPanX=panX; pinchPanY=panY; pinchScale=scale;
      pinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    }
  },{passive:false});

  wrap.addEventListener('touchmove',e=>{
    if(e.touches.length===1&&drawing){
      e.preventDefault();
      const p=toCanvas(e.touches[0].clientX,e.touches[0].clientY);
      if(tool==='draw'||tool==='erase'){
        const c=tool==='erase'?(lightBg?'#f8f8f8':'#1a1a1a'):color;
        const seg={x1:lx,y1:ly,x2:p.x,y2:p.y,c,s:brushSize,o:brushOpacity};
        drawSeg(seg); currentStroke.push(seg);
        lx=p.x; ly=p.y;
      } else {
        drawShapePreview(sx,sy,p.x,p.y);
        lx=p.x; ly=p.y;
      }
    } else if(e.touches.length===2&&isPanning){
      e.preventDefault();
      const cx=(e.touches[0].clientX+e.touches[1].clientX)/2;
      const cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
      const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      const f=dist/pinchDist;
      const newScale=Math.min(10,Math.max(0.05,pinchScale*f));
      const r=wrap.getBoundingClientRect();
      const mx=pinchCX-r.left, my=pinchCY-r.top;
      scale=newScale;
      panX=mx-(mx-pinchPanX)*(newScale/pinchScale)+(cx-pinchCX);
      panY=my-(my-pinchPanY)*(newScale/pinchScale)+(cy-pinchCY);
      updateTransform();
    }
  },{passive:false});

  wrap.addEventListener('touchend',e=>{
    if(e.touches.length===0){
      if(drawing&&(tool==='draw'||tool==='erase')&&currentStroke.length){
        push(ref(db,`sessions/${sessionCode}/strokes`),{type:'path',segs:JSON.stringify(currentStroke),by:myId});
        currentStroke=[];
      } else if(drawing&&tool!=='draw'&&tool!=='erase'&&tool!=='text'){
        const p={x:lx,y:ly};
        ovCtx.clearRect(0,0,ovCanvas.width,ovCanvas.height);
        const entry={type:tool,x1:sx,y1:sy,x2:p.x,y2:p.y,c:color,s:brushSize,o:brushOpacity,by:myId};
        drawShape(ctx,entry);
        push(ref(db,`sessions/${sessionCode}/strokes`),entry);
      }
      drawing=false; isPanning=false;
    } else if(e.touches.length===1) isPanning=false;
  },{passive:false});
}

// ── DRAWING ──
function drawSeg(seg){
  ctx.beginPath(); ctx.moveTo(seg.x1,seg.y1); ctx.lineTo(seg.x2,seg.y2);
  ctx.globalAlpha=seg.o||1;
  ctx.strokeStyle=seg.c; ctx.lineWidth=seg.s; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.stroke(); ctx.globalAlpha=1;
}

function drawShape(c,d){
  c.globalAlpha=d.o||1;
  c.strokeStyle=d.c; c.lineWidth=d.s; c.lineCap='round';
  c.beginPath();
  if(d.type==='line'){c.moveTo(d.x1,d.y1);c.lineTo(d.x2,d.y2);c.stroke();}
  else if(d.type==='rect'){c.strokeRect(d.x1,d.y1,d.x2-d.x1,d.y2-d.y1);}
  else if(d.type==='circle'){
    const rx=Math.abs(d.x2-d.x1)/2, ry=Math.abs(d.y2-d.y1)/2;
    c.ellipse(d.x1+(d.x2-d.x1)/2,d.y1+(d.y2-d.y1)/2,rx,ry,0,0,Math.PI*2);
    c.stroke();
  } else if(d.type==='arrow'){
    const dx=d.x2-d.x1, dy=d.y2-d.y1;
    const angle=Math.atan2(dy,dx);
    const len=Math.hypot(dx,dy);
    const hw=Math.min(20,len*0.3);
    c.moveTo(d.x1,d.y1); c.lineTo(d.x2,d.y2); c.stroke();
    c.beginPath();
    c.moveTo(d.x2,d.y2);
    c.lineTo(d.x2-hw*Math.cos(angle-Math.PI/6),d.y2-hw*Math.sin(angle-Math.PI/6));
    c.moveTo(d.x2,d.y2);
    c.lineTo(d.x2-hw*Math.cos(angle+Math.PI/6),d.y2-hw*Math.sin(angle+Math.PI/6));
    c.stroke();
  }
  c.globalAlpha=1;
}

function drawShapePreview(x1,y1,x2,y2){
  ovCtx.clearRect(0,0,ovCanvas.width,ovCanvas.height);
  drawShape(ovCtx,{type:tool,x1,y1,x2,y2,c:color,s:brushSize,o:brushOpacity});
}

// ── FIREBASE ──
function loadThenSubscribe(){
  onValue(ref(db,`sessions/${sessionCode}/strokes`),snap=>{
    ctx.fillStyle=lightBg?'#f8f8f8':'#1a1a1a';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    knownKeys.clear();
    if(snap.exists()) snap.forEach(child=>{knownKeys.add(child.key);applyStroke(child.val());});
    onChildAdded(ref(db,`sessions/${sessionCode}/strokes`),snap2=>{
      if(knownKeys.has(snap2.key)) return;
      knownKeys.add(snap2.key);
      const d=snap2.val(); if(d.by===myId) return;
      applyStroke(d);
    });
  },{onlyOnce:true});
}

function applyStroke(d){
  if(d.type==='path') JSON.parse(d.segs).forEach(seg=>drawSeg(seg));
  else if(d.type==='text'){
    ctx.globalAlpha=d.o||1;
    ctx.font=`${d.s}px 'Segoe UI',system-ui,sans-serif`; ctx.fillStyle=d.c;
    ctx.fillText(d.text,d.x,d.y); ctx.globalAlpha=1;
  } else if(d.type==='clear'){
    ctx.fillStyle=lightBg?'#f8f8f8':'#1a1a1a';
    ctx.fillRect(0,0,canvas.width,canvas.height);
  } else if(d.type==='image'){
    const img=new Image(); img.onload=()=>ctx.drawImage(img,d.x,d.y,d.w,d.h); img.src=d.src;
  } else if(['line','rect','circle','arrow'].includes(d.type)){
    drawShape(ctx,d);
  }
}

// ── UNDO (local only) ──
window.undoLocal=function(){
  if(!localHistory.length){toast('Rien à annuler');return;}
  localHistory.pop();
  ctx.fillStyle=lightBg?'#f8f8f8':'#1a1a1a';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  onValue(ref(db,`sessions/${sessionCode}/strokes`),snap=>{
    if(snap.exists()) snap.forEach(child=>applyStroke(child.val()));
    localHistory.forEach(h=>{if(h.type==='path')JSON.parse(h.segs).forEach(seg=>drawSeg(seg));else applyStroke(h);});
  },{onlyOnce:true});
  toast('Annulé');
};

// ── PRESENCE ──
function trackPresence(){
  const myRef=ref(db,`sessions/${sessionCode}/users/${myId}`);
  set(myRef,{name:myName,color:myColor,online:true}); onDisconnect(myRef).remove();
  onValue(ref(db,`sessions/${sessionCode}/users`),snap=>{
    document.getElementById('users-lbl').textContent=snap.exists()?Object.keys(snap.val()).length:1;
  });
}

// ── CURSORS ──
const remoteCursors={};
function trackCursors(){
  onValue(ref(db,`sessions/${sessionCode}/cursors`),snap=>{
    if(!snap.exists()) return;
    const wrap=document.getElementById('cwrap');
    snap.forEach(child=>{
      if(child.key===myId) return;
      const d=child.val();
      let el=remoteCursors[child.key];
      if(!el){
        el=document.createElement('div'); el.className='cursor-r';
        el.innerHTML=`<div class="cursor-arrow" style="background:${d.color}"></div><div class="cursor-lbl" style="background:${d.color}">${d.name}</div>`;
        wrap.appendChild(el); remoteCursors[child.key]=el;
      }
      el.style.left=(d.x*scale+panX)+'px';
      el.style.top=(d.y*scale+panY)+'px';
    });
  });
}
let lastCS=0;
function sendCursorPos(cx,cy){
  const now=Date.now(); if(now-lastCS<80) return; lastCS=now;
  set(ref(db,`sessions/${sessionCode}/cursors/${myId}`),{x:cx,y:cy,name:myName,color:myColor});
}

// ── MINIMAP ──
function startMinimap(){
  const mc=document.getElementById('minimap-canvas');
  mc.width=160; mc.height=90;
  minimapCtx=mc.getContext('2d');
  minimapInterval=setInterval(updateMinimap,500);
}
function updateMinimap(){
  if(!minimapCtx||!canvas) return;
  minimapCtx.clearRect(0,0,160,90);
  minimapCtx.drawImage(canvas,0,0,160,90);
  // viewport indicator
  const wrap=document.getElementById('cwrap');
  const vx=(-panX/scale)/canvas.width*160;
  const vy=(-panY/scale)/canvas.height*90;
  const vw=(wrap.clientWidth/scale)/canvas.width*160;
  const vh=(wrap.clientHeight/scale)/canvas.height*90;
  const vp=document.getElementById('minimap-vp');
  vp.style.left=Math.max(0,vx)+'px';
  vp.style.top=Math.max(0,vy)+'px';
  vp.style.width=Math.min(160,vw)+'px';
  vp.style.height=Math.min(90,vh)+'px';
}

// ── TOOLS ──
window.setTool=function(t){
  tool=t;
  document.querySelectorAll('.tbtn[id^="t-"]').forEach(b=>b.classList.remove('on'));
  const el=document.getElementById('t-'+t); if(el) el.classList.add('on');
  const wrap=document.getElementById('cwrap');
  wrap.style.cursor=t==='erase'?'cell':t==='text'?'text':'crosshair';
};
window.setColor=setColor;
window.brushSize=brushSize;
window.brushOpacity=brushOpacity;

window.clearAll=function(){
  if(!confirm('Effacer pour tout le monde ?')) return;
  ctx.fillStyle=lightBg?'#f8f8f8':'#1a1a1a'; ctx.fillRect(0,0,canvas.width,canvas.height);
  remove(ref(db,`sessions/${sessionCode}/strokes`)); knownKeys.clear(); localHistory=[];
  push(ref(db,`sessions/${sessionCode}/strokes`),{type:'clear',by:myId});
};

window.toggleBg=function(){
  lightBg=!lightBg;
  document.getElementById('cwrap').style.background=lightBg?'#f5f5f5':'#1a1a1a';
  ctx.fillStyle=lightBg?'#f8f8f8':'#1a1a1a'; ctx.fillRect(0,0,canvas.width,canvas.height);
  loadThenSubscribe();
};

window.uploadImg=function(e){
  const file=e.target.files[0]; if(!file) return;
  toast('Envoi en cours…',4000);
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=1800; let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const tmp=document.createElement('canvas'); tmp.width=w; tmp.height=h;
      tmp.getContext('2d').drawImage(img,0,0,w,h);
      const src=tmp.toDataURL('image/jpeg',0.93);
      const maxW=Math.min(900,canvas.width*0.55);
      const sc2=Math.min(maxW/w,maxW/h,1);
      const fw=w*sc2, fh=h*sc2;
      const x=(canvas.width-fw)/2, y=(canvas.height-fh)/2;
      ctx.drawImage(img,x,y,fw,fh);
      push(ref(db,`sessions/${sessionCode}/strokes`),{type:'image',src,x,y,w:fw,h:fh,by:myId});
      toast('Image publiée !');
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file); e.target.value='';
};

window.dlCanvas=function(){
  const link=document.createElement('a');
  link.download='canvas-'+sessionCode+'.png';
  link.href=canvas.toDataURL('image/png');
  link.click(); toast('Canvas exporté !');
};

window.copyCode=function(){
  navigator.clipboard.writeText(sessionCode).then(()=>toast('Code copié : '+sessionCode));
};
